"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в–‘в–’в–“](#ffb1c4)\
[оҜҶ ](bg:#ffb1c4 fg:#5c0029)\
[оӮҙ](bg:#f5b7b3 fg:#ffb1c4)\
$directory\
[оӮҙ](fg:#f5b7b3 bg:#b50057)\
$git_branch\
$git_status\
[оӮҙ](fg:#b50057 bg:#38282c)\
$nodejs\
$rust\
$golang\
$lua\
$c\
$php\
[оӮҙ](fg:#38282c bg:#2d1e21)\
$time\
[оӮҙ ](fg:#2d1e21)\
\n$character""" 

[directory]
style = "fg:#46201f bg:#f5b7b3"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#b50057"
format = '[[ $symbol $branch ](fg:#f5b7b3 bg:#b50057)]($style)'

[git_status]
style = "bg:#b50057"
format = '[[($all_status$ahead_behind )](fg:#f5b7b3 bg:#b50057)]($style)'

[python]
symbol = "оңј "
style = "bg:#38282c"
format = '[[ $symbol ($version) ( \($virtualenv\) )](fg:#f5b7b3 bg:#38282c)]($style)'

[java]
symbol = "оү– "
style = "bg:#38282c"
format = '[[ $symbol ($version) ](fg:#f5b7b3 bg:#38282c)]($style)'

[rust]
symbol = "оһЁ "
style = "bg:#38282c"
format = '[[ $symbol ($version) ](fg:#f5b7b3 bg:#38282c)]($style)'

[nodejs]
symbol = "оҙҚ "
style = "bg:#38282c"
format = '[[ $symbol ($version) ](fg:#f5b7b3 bg:#38282c)]($style)'

[golang]
symbol = "оҳ§ "
style = "bg:#38282c"
format = '[[ $symbol ($version) ](fg:#f5b7b3 bg:#38282c)]($style)'

[lua]
symbol = "о Ұ "
style = "bg:#38282c"
format = '[[ $symbol ($version) ](fg:#f5b7b3 bg:#38282c)]($style)'

[c]
symbol = "оҳһ "
style = "bg:#38282c"
format = '[[ $symbol ($version) ](fg:#f5b7b3 bg:#38282c)]($style)'

[docker_context]
symbol = "пҢҲ "
style = "bg:#2d1e21"
format = '[[ $symbol $context ](fg:#d9c0c5 bg:#2d1e21)]($style)'

[cmd_duration]
min_time = 2000
style = "bg:#2d1e21"
format = '[[ уұҺ« $duration ](fg:#d9c0c5 bg:#2d1e21)]($style)'

[time]
disabled = false
time_format = "%R" 
style = "bg:#2d1e21"
format = '[[ пҗә $time ](fg:#d9c0c5 bg:#2d1e21)]($style)'

[character]
success_symbol = "[пҒҳ](bold fg:#ffb1c4) "
error_symbol = "[оӘҮ](bold fg:#ffb4ab) "
vimcmd_symbol = "[оҹ…](bold fg:#f5b7b3)"
