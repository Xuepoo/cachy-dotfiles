"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в–‘в–’в–“](#b1c5ff)\
[оҜҶ ](bg:#b1c5ff fg:#002767)\
[оӮҙ](bg:#c4c3eb fg:#b1c5ff)\
$directory\
[оӮҙ](fg:#c4c3eb bg:#0054ca)\
$git_branch\
$git_status\
[оӮҙ](fg:#0054ca bg:#292c36)\
$nodejs\
$rust\
$golang\
$lua\
$c\
$php\
[оӮҙ](fg:#292c36 bg:#1f222b)\
$time\
[оӮҙ ](fg:#1f222b)\
\n$character""" 

[directory]
style = "fg:#272847 bg:#c4c3eb"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#0054ca"
format = '[[ $symbol $branch ](fg:#c4c3eb bg:#0054ca)]($style)'

[git_status]
style = "bg:#0054ca"
format = '[[($all_status$ahead_behind )](fg:#c4c3eb bg:#0054ca)]($style)'

[python]
symbol = "оңј "
style = "bg:#292c36"
format = '[[ $symbol ($version) ( \($virtualenv\) )](fg:#c4c3eb bg:#292c36)]($style)'

[java]
symbol = "оү– "
style = "bg:#292c36"
format = '[[ $symbol ($version) ](fg:#c4c3eb bg:#292c36)]($style)'

[rust]
symbol = "оһЁ "
style = "bg:#292c36"
format = '[[ $symbol ($version) ](fg:#c4c3eb bg:#292c36)]($style)'

[nodejs]
symbol = "оҙҚ "
style = "bg:#292c36"
format = '[[ $symbol ($version) ](fg:#c4c3eb bg:#292c36)]($style)'

[golang]
symbol = "оҳ§ "
style = "bg:#292c36"
format = '[[ $symbol ($version) ](fg:#c4c3eb bg:#292c36)]($style)'

[lua]
symbol = "о Ұ "
style = "bg:#292c36"
format = '[[ $symbol ($version) ](fg:#c4c3eb bg:#292c36)]($style)'

[c]
symbol = "оҳһ "
style = "bg:#292c36"
format = '[[ $symbol ($version) ](fg:#c4c3eb bg:#292c36)]($style)'

[docker_context]
symbol = "пҢҲ "
style = "bg:#1f222b"
format = '[[ $symbol $context ](fg:#c4c6d3 bg:#1f222b)]($style)'

[cmd_duration]
min_time = 2000
style = "bg:#1f222b"
format = '[[ уұҺ« $duration ](fg:#c4c6d3 bg:#1f222b)]($style)'

[time]
disabled = false
time_format = "%R" 
style = "bg:#1f222b"
format = '[[ пҗә $time ](fg:#c4c6d3 bg:#1f222b)]($style)'

[character]
success_symbol = "[пҒҳ](bold fg:#b1c5ff) "
error_symbol = "[оӘҮ](bold fg:#ffb4ab) "
vimcmd_symbol = "[оҹ…](bold fg:#c4c3eb)"
