"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в–‘в–’в–“](#a1c9ff)\
[оҜҶ ](bg:#a1c9ff fg:#002c51)\
[оӮҙ](bg:#bbc6ea fg:#a1c9ff)\
$directory\
[оӮҙ](fg:#bbc6ea bg:#005ea2)\
$git_branch\
$git_status\
[оӮҙ](fg:#005ea2 bg:#272d36)\
$nodejs\
$rust\
$golang\
$lua\
$c\
$php\
[оӮҙ](fg:#272d36 bg:#1c222b)\
$time\
[оӮҙ ](fg:#1c222b)\
\n$character""" 

[directory]
style = "fg:#1f2a47 bg:#bbc6ea"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#005ea2"
format = '[[ $symbol $branch ](fg:#bbc6ea bg:#005ea2)]($style)'

[git_status]
style = "bg:#005ea2"
format = '[[($all_status$ahead_behind )](fg:#bbc6ea bg:#005ea2)]($style)'

[python]
symbol = "оңј "
style = "bg:#272d36"
format = '[[ $symbol ($version) ( \($virtualenv\) )](fg:#bbc6ea bg:#272d36)]($style)'

[java]
symbol = "оү– "
style = "bg:#272d36"
format = '[[ $symbol ($version) ](fg:#bbc6ea bg:#272d36)]($style)'

[rust]
symbol = "оһЁ "
style = "bg:#272d36"
format = '[[ $symbol ($version) ](fg:#bbc6ea bg:#272d36)]($style)'

[nodejs]
symbol = "оҙҚ "
style = "bg:#272d36"
format = '[[ $symbol ($version) ](fg:#bbc6ea bg:#272d36)]($style)'

[golang]
symbol = "оҳ§ "
style = "bg:#272d36"
format = '[[ $symbol ($version) ](fg:#bbc6ea bg:#272d36)]($style)'

[lua]
symbol = "о Ұ "
style = "bg:#272d36"
format = '[[ $symbol ($version) ](fg:#bbc6ea bg:#272d36)]($style)'

[c]
symbol = "оҳһ "
style = "bg:#272d36"
format = '[[ $symbol ($version) ](fg:#bbc6ea bg:#272d36)]($style)'

[docker_context]
symbol = "пҢҲ "
style = "bg:#1c222b"
format = '[[ $symbol $context ](fg:#c1c7d2 bg:#1c222b)]($style)'

[cmd_duration]
min_time = 2000
style = "bg:#1c222b"
format = '[[ уұҺ« $duration ](fg:#c1c7d2 bg:#1c222b)]($style)'

[time]
disabled = false
time_format = "%R" 
style = "bg:#1c222b"
format = '[[ пҗә $time ](fg:#c1c7d2 bg:#1c222b)]($style)'

[character]
success_symbol = "[пҒҳ](bold fg:#a1c9ff) "
error_symbol = "[оӘҮ](bold fg:#ffb4ab) "
vimcmd_symbol = "[оҹ…](bold fg:#bbc6ea)"
