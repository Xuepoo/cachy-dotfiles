"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в–‘в–’в–“](#a3aed2)\
[у°ЈҮ ](bg:#a3aed2 fg:#090c0c)\
[оӮҙ](bg:#769ff0 fg:#a3aed2)\
$directory\
[оӮҙ](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[оӮҙ](fg:#394260 bg:#212736)\
$nodejs\
$rust\
$golang\
$lua\
$c\
$php\
[оӮҙ](fg:#212736 bg:#1d2230)\
$time\
[оӮҙ ](fg:#1d2230)\
\n$character""" 

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

# --- иҜӯиЁҖжЁЎеқ—еўһејә ---

[python]
symbol = "оңј "
style = "bg:#212736"
# жҳҫзӨә virtualenv еҗҚз§°еҜ№йҡ”зҰ»ејҖеҸ‘иҮіе…ійҮҚиҰҒ
format = '[[ $symbol ($version) ( \($virtualenv\) )](fg:#769ff0 bg:#212736)]($style)'

[java]
symbol = "оү– "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "оһЁ "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[nodejs]
symbol = "оҙҚ "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "оҳ§ "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[lua]
symbol = "о Ұ "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[c]
symbol = "оҳһ "
style = "bg:#212736"
# жЈҖжөӢеҲ° CMakeLists.txt, Makefile, жҲ– .c/.cpp ж–Үд»¶ж—¶и§ҰеҸ‘
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

# --- зі»з»ҹдёҺж•ҲиғҪжЁЎеқ— ---

[docker_context]
symbol = "пҢҲ "
style = "bg:#1d2230"
format = '[[ $symbol $context ](fg:#a0a9cb bg:#1d2230)]($style)'

[cmd_duration]
min_time = 2000 # и¶…иҝҮ 2s зҡ„е‘Ҫд»ӨжүҚжҳҫзӨә
style = "bg:#1d2230"
format = '[[ уұҺ« $duration ](fg:#a0a9cb bg:#1d2230)]($style)'

[time]
disabled = false
time_format = "%R" 
style = "bg:#1d2230"
format = '[[ пҗә $time ](fg:#a0a9cb bg:#1d2230)]($style)'

[character]
success_symbol = "[пҒҳ](bold green) "
error_symbol = "[оӘҮ](bold red) "
vimcmd_symbol = "[оҹ…](bold blue)"
