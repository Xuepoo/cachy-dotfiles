"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в–‘в–’в–“](#913200)\
[оҜҶ ](bg:#913200 fg:#ffffff)\
[оӮҙ](bg:#6e492a fg:#913200)\
$directory\
[оӮҙ](fg:#6e492a bg:#ff8552)\
$git_branch\
$git_status\
[оӮҙ](fg:#ff8552 bg:#fbdfd5)\
$nodejs\
$rust\
$golang\
$lua\
$c\
$php\
[оӮҙ](fg:#fbdfd5 bg:#ffe7df)\
$time\
[оӮҙ ](fg:#ffe7df)\
\n$character""" 

[directory]
style = "fg:#ffffff bg:#6e492a"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#ff8552"
format = '[[ $symbol $branch ](fg:#6e492a bg:#ff8552)]($style)'

[git_status]
style = "bg:#ff8552"
format = '[[($all_status$ahead_behind )](fg:#6e492a bg:#ff8552)]($style)'

[python]
symbol = "оңј "
style = "bg:#fbdfd5"
format = '[[ $symbol ($version) ( \($virtualenv\) )](fg:#6e492a bg:#fbdfd5)]($style)'

[java]
symbol = "оү– "
style = "bg:#fbdfd5"
format = '[[ $symbol ($version) ](fg:#6e492a bg:#fbdfd5)]($style)'

[rust]
symbol = "оһЁ "
style = "bg:#fbdfd5"
format = '[[ $symbol ($version) ](fg:#6e492a bg:#fbdfd5)]($style)'

[nodejs]
symbol = "оҙҚ "
style = "bg:#fbdfd5"
format = '[[ $symbol ($version) ](fg:#6e492a bg:#fbdfd5)]($style)'

[golang]
symbol = "оҳ§ "
style = "bg:#fbdfd5"
format = '[[ $symbol ($version) ](fg:#6e492a bg:#fbdfd5)]($style)'

[lua]
symbol = "о Ұ "
style = "bg:#fbdfd5"
format = '[[ $symbol ($version) ](fg:#6e492a bg:#fbdfd5)]($style)'

[c]
symbol = "оҳһ "
style = "bg:#fbdfd5"
format = '[[ $symbol ($version) ](fg:#6e492a bg:#fbdfd5)]($style)'

[docker_context]
symbol = "пҢҲ "
style = "bg:#ffe7df"
format = '[[ $symbol $context ](fg:#55433c bg:#ffe7df)]($style)'

[cmd_duration]
min_time = 2000
style = "bg:#ffe7df"
format = '[[ уұҺ« $duration ](fg:#55433c bg:#ffe7df)]($style)'

[time]
disabled = false
time_format = "%R" 
style = "bg:#ffe7df"
format = '[[ пҗә $time ](fg:#55433c bg:#ffe7df)]($style)'

[character]
success_symbol = "[пҒҳ](bold fg:#913200) "
error_symbol = "[оӘҮ](bold fg:#a6050f) "
vimcmd_symbol = "[оҹ…](bold fg:#6e492a)"
