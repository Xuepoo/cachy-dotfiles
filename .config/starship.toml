"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в–‘в–’в–“](#0050a1)\
[оҜҶ ](bg:#0050a1 fg:#ffffff)\
[оӮҙ](bg:#4a4f70 fg:#0050a1)\
$directory\
[оӮҙ](fg:#4a4f70 bg:#73a8ff)\
$git_branch\
$git_status\
[оӮҙ](fg:#73a8ff bg:#e1e4f1)\
$nodejs\
$rust\
$golang\
$lua\
$c\
$php\
[оӮҙ](fg:#e1e4f1 bg:#e8ecf9)\
$time\
[оӮҙ ](fg:#e8ecf9)\
\n$character""" 

[directory]
style = "fg:#ffffff bg:#4a4f70"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#73a8ff"
format = '[[ $symbol $branch ](fg:#4a4f70 bg:#73a8ff)]($style)'

[git_status]
style = "bg:#73a8ff"
format = '[[($all_status$ahead_behind )](fg:#4a4f70 bg:#73a8ff)]($style)'

[python]
symbol = "оңј "
style = "bg:#e1e4f1"
format = '[[ $symbol ($version) ( \($virtualenv\) )](fg:#4a4f70 bg:#e1e4f1)]($style)'

[java]
symbol = "оү– "
style = "bg:#e1e4f1"
format = '[[ $symbol ($version) ](fg:#4a4f70 bg:#e1e4f1)]($style)'

[rust]
symbol = "оһЁ "
style = "bg:#e1e4f1"
format = '[[ $symbol ($version) ](fg:#4a4f70 bg:#e1e4f1)]($style)'

[nodejs]
symbol = "оҙҚ "
style = "bg:#e1e4f1"
format = '[[ $symbol ($version) ](fg:#4a4f70 bg:#e1e4f1)]($style)'

[golang]
symbol = "оҳ§ "
style = "bg:#e1e4f1"
format = '[[ $symbol ($version) ](fg:#4a4f70 bg:#e1e4f1)]($style)'

[lua]
symbol = "о Ұ "
style = "bg:#e1e4f1"
format = '[[ $symbol ($version) ](fg:#4a4f70 bg:#e1e4f1)]($style)'

[c]
symbol = "оҳһ "
style = "bg:#e1e4f1"
format = '[[ $symbol ($version) ](fg:#4a4f70 bg:#e1e4f1)]($style)'

[docker_context]
symbol = "пҢҲ "
style = "bg:#e8ecf9"
format = '[[ $symbol $context ](fg:#424751 bg:#e8ecf9)]($style)'

[cmd_duration]
min_time = 2000
style = "bg:#e8ecf9"
format = '[[ уұҺ« $duration ](fg:#424751 bg:#e8ecf9)]($style)'

[time]
disabled = false
time_format = "%R" 
style = "bg:#e8ecf9"
format = '[[ пҗә $time ](fg:#424751 bg:#e8ecf9)]($style)'

[character]
success_symbol = "[пҒҳ](bold fg:#0050a1) "
error_symbol = "[оӘҮ](bold fg:#a6050f) "
vimcmd_symbol = "[оҹ…](bold fg:#4a4f70)"
