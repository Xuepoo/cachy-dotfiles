"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в–‘в–’в–“](#005394)\
[оҜҶ ](bg:#005394 fg:#ffffff)\
[оӮҙ](bg:#475070 fg:#005394)\
$directory\
[оӮҙ](fg:#475070 bg:#64aaff)\
$git_branch\
$git_status\
[оӮҙ](fg:#64aaff bg:#e0e5f1)\
$nodejs\
$rust\
$golang\
$lua\
$c\
$php\
[оӮҙ](fg:#e0e5f1 bg:#e7ecf8)\
$time\
[оӮҙ ](fg:#e7ecf8)\
\n$character""" 

[directory]
style = "fg:#ffffff bg:#475070"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#64aaff"
format = '[[ $symbol $branch ](fg:#475070 bg:#64aaff)]($style)'

[git_status]
style = "bg:#64aaff"
format = '[[($all_status$ahead_behind )](fg:#475070 bg:#64aaff)]($style)'

[python]
symbol = "оңј "
style = "bg:#e0e5f1"
format = '[[ $symbol ($version) ( \($virtualenv\) )](fg:#475070 bg:#e0e5f1)]($style)'

[java]
symbol = "оү– "
style = "bg:#e0e5f1"
format = '[[ $symbol ($version) ](fg:#475070 bg:#e0e5f1)]($style)'

[rust]
symbol = "оһЁ "
style = "bg:#e0e5f1"
format = '[[ $symbol ($version) ](fg:#475070 bg:#e0e5f1)]($style)'

[nodejs]
symbol = "оҙҚ "
style = "bg:#e0e5f1"
format = '[[ $symbol ($version) ](fg:#475070 bg:#e0e5f1)]($style)'

[golang]
symbol = "оҳ§ "
style = "bg:#e0e5f1"
format = '[[ $symbol ($version) ](fg:#475070 bg:#e0e5f1)]($style)'

[lua]
symbol = "о Ұ "
style = "bg:#e0e5f1"
format = '[[ $symbol ($version) ](fg:#475070 bg:#e0e5f1)]($style)'

[c]
symbol = "оҳһ "
style = "bg:#e0e5f1"
format = '[[ $symbol ($version) ](fg:#475070 bg:#e0e5f1)]($style)'

[docker_context]
symbol = "пҢҲ "
style = "bg:#e7ecf8"
format = '[[ $symbol $context ](fg:#414751 bg:#e7ecf8)]($style)'

[cmd_duration]
min_time = 2000
style = "bg:#e7ecf8"
format = '[[ уұҺ« $duration ](fg:#414751 bg:#e7ecf8)]($style)'

[time]
disabled = false
time_format = "%R" 
style = "bg:#e7ecf8"
format = '[[ пҗә $time ](fg:#414751 bg:#e7ecf8)]($style)'

[character]
success_symbol = "[пҒҳ](bold fg:#005394) "
error_symbol = "[оӘҮ](bold fg:#a6050f) "
vimcmd_symbol = "[оҹ…](bold fg:#475070)"
