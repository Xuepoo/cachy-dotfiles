"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в–‘в–’в–“](#ffb1c4)\
[оҜҶ ](bg:#ffb1c4 fg:#65002e)\
[оӮҙ](bg:#f5b7b3 fg:#ffb1c4)\
$directory\
[оӮҙ](fg:#f5b7b3 bg:#8f0043)\
$git_branch\
$git_status\
[оӮҙ](fg:#8f0043 bg:#352629)\
$nodejs\
$rust\
$golang\
$lua\
$c\
$php\
[оӮҙ](fg:#352629 bg:#2a1c1f)\
$time\
[оӮҙ ](fg:#2a1c1f)\
\n$character""" 

[directory]
style = "fg:#4c2523 bg:#f5b7b3"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#8f0043"
format = '[[ $symbol $branch ](fg:#f5b7b3 bg:#8f0043)]($style)'

[git_status]
style = "bg:#8f0043"
format = '[[($all_status$ahead_behind )](fg:#f5b7b3 bg:#8f0043)]($style)'

[python]
symbol = "оңј "
style = "bg:#352629"
format = '[[ $symbol ($version) ( \($virtualenv\) )](fg:#f5b7b3 bg:#352629)]($style)'

[java]
symbol = "оү– "
style = "bg:#352629"
format = '[[ $symbol ($version) ](fg:#f5b7b3 bg:#352629)]($style)'

[rust]
symbol = "оһЁ "
style = "bg:#352629"
format = '[[ $symbol ($version) ](fg:#f5b7b3 bg:#352629)]($style)'

[nodejs]
symbol = "оҙҚ "
style = "bg:#352629"
format = '[[ $symbol ($version) ](fg:#f5b7b3 bg:#352629)]($style)'

[golang]
symbol = "оҳ§ "
style = "bg:#352629"
format = '[[ $symbol ($version) ](fg:#f5b7b3 bg:#352629)]($style)'

[lua]
symbol = "о Ұ "
style = "bg:#352629"
format = '[[ $symbol ($version) ](fg:#f5b7b3 bg:#352629)]($style)'

[c]
symbol = "оҳһ "
style = "bg:#352629"
format = '[[ $symbol ($version) ](fg:#f5b7b3 bg:#352629)]($style)'

[docker_context]
symbol = "пҢҲ "
style = "bg:#2a1c1f"
format = '[[ $symbol $context ](fg:#d9c0c5 bg:#2a1c1f)]($style)'

[cmd_duration]
min_time = 2000
style = "bg:#2a1c1f"
format = '[[ уұҺ« $duration ](fg:#d9c0c5 bg:#2a1c1f)]($style)'

[time]
disabled = false
time_format = "%R" 
style = "bg:#2a1c1f"
format = '[[ пҗә $time ](fg:#d9c0c5 bg:#2a1c1f)]($style)'

[character]
success_symbol = "[пҒҳ](bold green) "
error_symbol = "[оӘҮ](bold red) "
vimcmd_symbol = "[оҹ…](bold blue)"
