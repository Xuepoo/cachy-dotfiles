"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в–‘в–’в–“](#005a6a)\
[оҜҶ ](bg:#005a6a fg:#ffffff)\
[оӮҙ](bg:#335569 fg:#005a6a)\
$directory\
[оӮҙ](fg:#335569 bg:#00b7d6)\
$git_branch\
$git_status\
[оӮҙ](fg:#00b7d6 bg:#dae7eb)\
$nodejs\
$rust\
$golang\
$lua\
$c\
$php\
[оӮҙ](fg:#dae7eb bg:#e2eef3)\
$time\
[оӮҙ ](fg:#e2eef3)\
\n$character""" 

[directory]
style = "fg:#ffffff bg:#335569"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#00b7d6"
format = '[[ $symbol $branch ](fg:#335569 bg:#00b7d6)]($style)'

[git_status]
style = "bg:#00b7d6"
format = '[[($all_status$ahead_behind )](fg:#335569 bg:#00b7d6)]($style)'

[python]
symbol = "оңј "
style = "bg:#dae7eb"
format = '[[ $symbol ($version) ( \($virtualenv\) )](fg:#335569 bg:#dae7eb)]($style)'

[java]
symbol = "оү– "
style = "bg:#dae7eb"
format = '[[ $symbol ($version) ](fg:#335569 bg:#dae7eb)]($style)'

[rust]
symbol = "оһЁ "
style = "bg:#dae7eb"
format = '[[ $symbol ($version) ](fg:#335569 bg:#dae7eb)]($style)'

[nodejs]
symbol = "оҙҚ "
style = "bg:#dae7eb"
format = '[[ $symbol ($version) ](fg:#335569 bg:#dae7eb)]($style)'

[golang]
symbol = "оҳ§ "
style = "bg:#dae7eb"
format = '[[ $symbol ($version) ](fg:#335569 bg:#dae7eb)]($style)'

[lua]
symbol = "о Ұ "
style = "bg:#dae7eb"
format = '[[ $symbol ($version) ](fg:#335569 bg:#dae7eb)]($style)'

[c]
symbol = "оҳһ "
style = "bg:#dae7eb"
format = '[[ $symbol ($version) ](fg:#335569 bg:#dae7eb)]($style)'

[docker_context]
symbol = "пҢҲ "
style = "bg:#e2eef3"
format = '[[ $symbol $context ](fg:#3d494c bg:#e2eef3)]($style)'

[cmd_duration]
min_time = 2000
style = "bg:#e2eef3"
format = '[[ уұҺ« $duration ](fg:#3d494c bg:#e2eef3)]($style)'

[time]
disabled = false
time_format = "%R" 
style = "bg:#e2eef3"
format = '[[ пҗә $time ](fg:#3d494c bg:#e2eef3)]($style)'

[character]
success_symbol = "[пҒҳ](bold fg:#005a6a) "
error_symbol = "[оӘҮ](bold fg:#a6050f) "
vimcmd_symbol = "[оҹ…](bold fg:#335569)"
