"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в–‘в–’в–“](#aac7ff)\
[оҜҶ ](bg:#aac7ff fg:#002a5b)\
[оӮҙ](bg:#c0c4eb fg:#aac7ff)\
$directory\
[оӮҙ](fg:#c0c4eb bg:#005ab4)\
$git_branch\
$git_status\
[оӮҙ](fg:#005ab4 bg:#282d36)\
$nodejs\
$rust\
$golang\
$lua\
$c\
$php\
[оӮҙ](fg:#282d36 bg:#1e222b)\
$time\
[оӮҙ ](fg:#1e222b)\
\n$character""" 

[directory]
style = "fg:#242948 bg:#c0c4eb"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#005ab4"
format = '[[ $symbol $branch ](fg:#c0c4eb bg:#005ab4)]($style)'

[git_status]
style = "bg:#005ab4"
format = '[[($all_status$ahead_behind )](fg:#c0c4eb bg:#005ab4)]($style)'

[python]
symbol = "оңј "
style = "bg:#282d36"
format = '[[ $symbol ($version) ( \($virtualenv\) )](fg:#c0c4eb bg:#282d36)]($style)'

[java]
symbol = "оү– "
style = "bg:#282d36"
format = '[[ $symbol ($version) ](fg:#c0c4eb bg:#282d36)]($style)'

[rust]
symbol = "оһЁ "
style = "bg:#282d36"
format = '[[ $symbol ($version) ](fg:#c0c4eb bg:#282d36)]($style)'

[nodejs]
symbol = "оҙҚ "
style = "bg:#282d36"
format = '[[ $symbol ($version) ](fg:#c0c4eb bg:#282d36)]($style)'

[golang]
symbol = "оҳ§ "
style = "bg:#282d36"
format = '[[ $symbol ($version) ](fg:#c0c4eb bg:#282d36)]($style)'

[lua]
symbol = "о Ұ "
style = "bg:#282d36"
format = '[[ $symbol ($version) ](fg:#c0c4eb bg:#282d36)]($style)'

[c]
symbol = "оҳһ "
style = "bg:#282d36"
format = '[[ $symbol ($version) ](fg:#c0c4eb bg:#282d36)]($style)'

[docker_context]
symbol = "пҢҲ "
style = "bg:#1e222b"
format = '[[ $symbol $context ](fg:#c3c6d3 bg:#1e222b)]($style)'

[cmd_duration]
min_time = 2000
style = "bg:#1e222b"
format = '[[ уұҺ« $duration ](fg:#c3c6d3 bg:#1e222b)]($style)'

[time]
disabled = false
time_format = "%R" 
style = "bg:#1e222b"
format = '[[ пҗә $time ](fg:#c3c6d3 bg:#1e222b)]($style)'

[character]
success_symbol = "[пҒҳ](bold fg:#aac7ff) "
error_symbol = "[оӘҮ](bold fg:#ffb4ab) "
vimcmd_symbol = "[оҹ…](bold fg:#c0c4eb)"
