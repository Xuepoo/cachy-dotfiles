[style.description]
foreground = { rgb = [{{colors.on_surface.default.red}}, {{colors.on_surface.default.green}}, {{colors.on_surface.default.blue}}] }
underline = false
bold = false
italic = false

[style.command_name]
foreground = { rgb = [{{colors.primary.default.red}}, {{colors.primary.default.green}}, {{colors.primary.default.blue}}] }
underline = false
bold = true
italic = false

[style.example_text]
foreground = { rgb = [{{colors.secondary.default.red}}, {{colors.secondary.default.green}}, {{colors.secondary.default.blue}}] }
underline = false
bold = false
italic = false

[style.example_code]
foreground = { rgb = [{{colors.on_surface.default.red}}, {{colors.on_surface.default.green}}, {{colors.on_surface.default.blue}}] }
underline = false
bold = false
italic = false

[style.example_variable]
foreground = { rgb = [{{colors.tertiary.default.red}}, {{colors.tertiary.default.green}}, {{colors.tertiary.default.blue}}] }
underline = true
bold = false
italic = false

[display]
compact = false
use_pager = false
show_title = false

[updates]
auto_update = false
auto_update_interval_hours = 720
archive_source = "https://github.com/tldr-pages/tldr/releases/latest/download/"
tls_backend = "rustls-with-webpki-roots"

