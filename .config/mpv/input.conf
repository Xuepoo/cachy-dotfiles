# Shader toggle
CTRL+1 change-list glsl-shaders set "~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_VL.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_VL.glsl"; show-text "Anime4K: High Quality"
CTRL+0 change-list glsl-shaders clr ""; show-text "GLSL shaders cleared"

# Audio device toggle
F8 cycle audio-device

# Loudness normalization toggle
CTRL+N af toggle loudnorm

