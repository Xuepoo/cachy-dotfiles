### Basic Settings ###
# Native Wayland support
gpu-context=wayland

# Vulkan API (best for NVIDIA + Wayland)
gpu-api=vulkan

# High quality profile
profile=gpu-hq

### Hardware Acceleration (NVIDIA RTX 4060) ###
hwdec=nvdec
hwdec-codecs=all
vd-lavc-dr=yes

### Display Optimization (2560x1600 240Hz OLED) ###
# Target peak brightness (typical OLED value)
target-peak=1000

# Colorspace auto detection
target-colorspace-hint=yes
target-prim=auto
target-trc=auto

# Contrast (OLED has infinite contrast)
target-contrast=inf

# Video sync (suitable for high refresh rate)
video-sync=display-resample
interpolation=yes
tscale=oversample

### Scaling Algorithms ###
# Upscaling (for low resolution video)
scale=ewa_lanczossharp
cscale=ewa_lanczossharp

# Downscaling
dscale=mitchell

# Chroma upscaling
correct-downscaling=yes
linear-downscaling=yes
sigmoid-upscaling=yes

### Anti-aliasing ###
dither-depth=auto
temporal-dither=yes

### Performance ###
# Deinterlacing
deinterlace=no

# Cache settings
cache=yes
demuxer-max-bytes=200M
demuxer-max-back-bytes=200M

### Audio Settings ###
audio-channels=auto
volume=100
volume-max=150

# Loudness normalization (optional, prevents volume spikes)


### Subtitle Settings ###
sub-auto=fuzzy
sub-file-paths=ass:srt:sub:subs:subtitles:字幕
slang=chi,zh,zh-CN,zh-Hans,eng,en
alang=chi,zh,jpn,ja,eng,en

# Subtitle font
sub-font='Noto Sans CJK SC'
sub-font-size=48
sub-color='#FFFFFF'
sub-border-size=3
sub-border-color='#000000'
sub-shadow-offset=1
sub-shadow-color='#33000000'

### Screenshot Settings ###
screenshot-format=png
screenshot-png-compression=8
screenshot-template='~/Pictures/mpv-screenshot-%F-%P'
screenshot-directory='~/Pictures'

### OSD Settings ###
osd-font='Noto Sans CJK SC'
osd-font-size=32
osd-color='#CCFFFFFF'
osd-border-color='#CC000000'
osd-bar-align-y=0.95
osd-border-size=2
osd-bar-h=2
osd-bar-w=60

### Window Behavior ###
keep-open=yes
save-position-on-quit=yes
force-window=immediate
autofit-larger=90%x90%
cursor-autohide=1000

### Video Profile (GPU-accelerated for video content) ###
[video]
profile-cond=vid
vo=gpu-next
gpu-context=wayland

### Audio-Only Profile (no GPU init for pure audio) ###
[audio-only]
profile-cond=not vid
vo=null

### Performance Debug (optional, enable for debugging) ###
# Show performance stats: Shift+I (toggle at runtime)

### Anime4K Profile (press Ctrl+1 to activate) ###
[anime-quality]
profile-desc="Anime4K High Quality"
profile-cond=width <= 1920 and height <= 1080
glsl-shaders="~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_VL.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_VL.glsl"

