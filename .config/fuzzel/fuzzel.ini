# ~/.config/fuzzel/fuzzel-template.ini
# Matugen template for fuzzel — auto-generated colors from wallpaper

[main]
width=35
lines=12
anchor=center
layer=overlay

# Matching
matching=fzf
sort-result=yes
match-counter=yes

# Font
font=JetBrainsMono Nerd Font:size=14
dpi-aware=auto
use-bold=true
letter-spacing=1

# Prompt & placeholder
prompt= 
placeholder=Search applications...

# Padding
horizontal-pad=48
vertical-pad=16
inner-pad=8

# Icons
icons-enabled=yes
icon-theme=Papirus-Dark

# Performance — delay filtering when many matches
delayed-filter-ms=200
delayed-filter-limit=500

# Behavior
hide-before-typing=no
auto-select=no

[colors]
background=181115e8
text=eddfe4cc
message=d3c2c9ff
prompt=f9b1dbff
placeholder=9c8d9388
input=eddfe4ff
match=f9b1dbff
selection=30282cff
selection-text=eddfe4ff
selection-match=f9b1dbff
counter=9c8d9399
border=f9b1db66

[border]
width=1
radius=16
selection-radius=10
