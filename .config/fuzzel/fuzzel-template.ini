# ~/.config/fuzzel/fuzzel-template.ini
# Matugen template for fuzzel — auto-generated colors from wallpaper

[main]
width=35
lines=12
anchor=center
layer=overlay

# Matching
matching=fzf
sort-result=yes
match-counter=yes

# Font
font=JetBrainsMono Nerd Font:size=14
dpi-aware=auto
use-bold=true
letter-spacing=1

# Prompt & placeholder
prompt= 
placeholder=Search applications...

# Padding
horizontal-pad=48
vertical-pad=16
inner-pad=8

# Icons
icons-enabled=yes
icon-theme=Papirus-Dark

# Performance — delay filtering when many matches
delayed-filter-ms=200
delayed-filter-limit=500

# Behavior
hide-before-typing=no
auto-select=no

[colors]
background={{colors.surface.default.hex_stripped}}e8
text={{colors.on_surface.default.hex_stripped}}cc
message={{colors.on_surface_variant.default.hex_stripped}}ff
prompt={{colors.primary.default.hex_stripped}}ff
placeholder={{colors.outline.default.hex_stripped}}88
input={{colors.on_surface.default.hex_stripped}}ff
match={{colors.primary.default.hex_stripped}}ff
selection={{colors.surface_container_high.default.hex_stripped}}ff
selection-text={{colors.on_surface.default.hex_stripped}}ff
selection-match={{colors.primary.default.hex_stripped}}ff
counter={{colors.outline.default.hex_stripped}}99
border={{colors.primary.default.hex_stripped}}66

[border]
width=1
radius=16
selection-radius=10
